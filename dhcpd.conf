# DHCPD Configuration — redacted reference copy
# MAC addresses, fixed IPs removed. hgpn001 and hgpn064 kept as examples.
# Full config lives on aidcvm: /etc/dhcp/dhcpd.conf (managed by Ansible)

allow booting;
allow bootp;
ddns-update-style interim;
authoritative;

# Declare the iPXE option space
option space ipxe;

option ipxe.no-pxedhcp code 176 = unsigned integer 8;
option ipxe.no-pxedhcp 1;
option ipxe-encap-opts code 175 = encapsulate ipxe;

option ipxe.http      code 19 = unsigned integer 8;
option ipxe.bzimage   code 24 = unsigned integer 8;
option ipxe.efi       code 36 = unsigned integer 8;

option architecture-type code 93 = unsigned integer 16;

# Default boot file — UEFI gets RHEL 8.9, legacy BIOS gets pxelinux
# Per-host filename overrides this (e.g. Ubuntu nodes set their own filename)
if option architecture-type = 00:07 {
    filename "/rhel-8.9-x86_64/uefi/BOOTX64.EFI";
} else {
    filename "/rhel-8.9-x86_64/pxelinux.0";
}

subnet 10.2.1.0 netmask 255.255.255.0 {
   not authoritative;
   option subnet-mask 255.255.255.0;
   option routers <GATEWAY_IP>;
   next-server <PXE_SERVER_IP>;
   range <DHCP_RANGE_START> <DHCP_RANGE_END>;

   # -----------------------------------------------------------------------
   # BMC entries — 10.2.255.x
   # Each node has one BMC entry (IPMI/iDRAC NIC)
   # -----------------------------------------------------------------------
   host hgpn001-bmc { hardware ethernet <MAC_ADDRESS>; fixed-address <BMC_IP>; }
   # ... (hgpn002 through hgpn128, lgn, dtn, rms, jump, mgn, aipn nodes)
   host hgpn064-bmc { hardware ethernet <MAC_ADDRESS>; fixed-address <BMC_IP>; }

   # -----------------------------------------------------------------------
   # mgmt entries — 10.2.1.x  (eno1 — PXE boot NIC)
   # Normal node: no filename override → boots default (RHEL)
   # Ubuntu reinstall: add filename to override boot target
   # -----------------------------------------------------------------------
   host hgpn001-mgmt { hardware ethernet <MAC_ADDRESS>; fixed-address <MGMT_IP>; }
   # ... (hgpn002 through hgpn128 and infra nodes)

   # hgpn064 has a filename override because it is being reinstalled with Ubuntu 26.04
   host hgpn064-mgmt { hardware ethernet <MAC_ADDRESS>; fixed-address <MGMT_IP>; filename "/ubuntu-26.04-amd64/uefi/BOOTX64.EFI"; }

   # -----------------------------------------------------------------------
   # mgmt1 entries — 10.2.2.x  (second management NIC, ConnectX)
   # No PXE boot — static IP assignment only
   # -----------------------------------------------------------------------
   host hgpn001-mgmt1 { hardware ethernet <MAC_ADDRESS>; fixed-address <MGMT1_IP>; }
   # ... (hgpn002 through hgpn128 and infra nodes)
   host hgpn064-mgmt1 { hardware ethernet <MAC_ADDRESS>; fixed-address <MGMT1_IP>; }

}
